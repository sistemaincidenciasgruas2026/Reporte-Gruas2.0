body{

}

.title{
  margin-top:0;

  font-size:24px;
  font-weight:700;
  color:#0f172a;
}

/* FORM */

.form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:22px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

.form-group.full{
  grid-column:span 2;
}

label{
  margin-bottom:8px;
  font-size:13px;
  font-weight:600;
  color:#475569;
}

input,
select,
textarea{
  width:100%;
  padding:13px;
  border-radius:14px;
  border:1px solid #dbe2ea;
  background:#f8fafc;
  font-size:14px;
  transition:.2s;
}

input:focus,
select:focus,
textarea:focus{
  outline:none;
  border-color:#2563eb;
  background:#fff;
  box-shadow:0 0 0 4px rgba(37,99,235,.10);
}

textarea{
  min-height:110px;
  resize:vertical;
}

/* BUTTON */

.primary{
  border:none;
  padding:15px;
  border-radius:14px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.primary:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(37,99,235,.30);
}



.table-container{
  width:100%;
  overflow-x:auto;
  border-radius:16px;
}

/* TABLA */
table{
  width:100%;
  min-width:unset;   
  table-layout:auto; 
  border-collapse:collapse;
  background:#fff;
}

/* HEADERS */

th{
  background:#f8fafc;
  color:#475569;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.5px;
  padding:16px 12px;
  border-bottom:2px solid #e2e8f0;
}

/* CELDAS */

td{
  padding:18px 12px;
  border-bottom:1px solid #edf2f7;
  vertical-align:middle;
  font-size:14px;

  overflow:hidden;
  text-overflow:ellipsis;
  word-wrap:break-word;
}
/* ESTADOS */

.badge{
  padding:10px 16px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;

  white-space:nowrap;
  overflow:visible;
  text-overflow:unset;

  min-width:120px;
}

.badge:hover{
  transform:scale(1.05);
}

/* ABIERTO */

.abierto{
  background:#fee2e2;
  color:#b91c1c;
}

/* EN PROCESO */

.proceso{
  background:#fef3c7;
  color:#92400e;
}

/* CERRADO */

.cerrado{
  background:#dcfce7;
  color:#166534;
}


/* DESCRIPCIÓN */

.descripcion-cell{
  white-space:normal;
  line-height:1.5;
}

/* INPUTS */

.fecha-atencion,
.nota-input{
  width:100%;
  border-radius:10px;
}

/* FOTOS */

.fotos-container{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;

.img-thumb,
video.img-thumb{
  width:55px;
  height:55px;

  border:2px solid #e2e8f0;

@media(max-width:800px){

/* GUARDAR CIERRE CON EVIDENCIA */

async function guardarCierreConEvidencia(i){

  const input = document.getElementById("fotoEvidencia");

  let evidencia = null;

  // Convertir imagen a base64
  if(input.files[0]){

    evidencia = await new Promise(res=>{

      const reader = new FileReader();

      reader.onload = e => res(e.target.result);

      reader.readAsDataURL(input.files[0]);

    });

  }

  const row = data[i];

  const { error } = await supabaseClient
    .from("reclamos")
    .update({
      estado: "cerrado",
      foto_evidencia: evidencia
    })
    .eq("id", row.id);

  if(error){

    console.error(error);

    alert("Error al cerrar reporte");

    return;
  }

  document.getElementById("modalEvidencia").remove();

  cargar();

}
/* SUBIR EVIDENCIA CIERRE */

async function subirEvidencia(event, id){

  const file = event.target.files[0];

  if(!file) return;

  const base64 = await new Promise(res=>{
    const reader = new FileReader();

    reader.onload = e => res(e.target.result);

    reader.readAsDataURL(file);
  });

  // Obtener imágenes actuales
  const row = data.find(r => r.id === id);

  let imagenesActuales = row.imagenes || [];

  // Guardar evidencia adicional
  const { error } = await supabaseClient
    .from("reclamos")
    .update({
      imagenes: [...imagenesActuales, base64]
    })
    .eq("id", id);

  if(error){
    console.error(error);
    alert("Error al subir evidencia");
    return;
  }

  alert("Evidencia subida correctamente");

  cargar();

}

        }

        // IMAGEN
        return `
          <img
            src="${r.foto_evidencia}"
            class="img-thumb"
            onclick="
              visor.innerHTML=
              '<img src=&quot;${r.foto_evidencia}&quot; style=&quot;max-width:90%;max-height:90%;border-radius:18px;&quot;>';

              visor.style.display='flex';
            "
          >
        `;

      })()

    : "-"
  }

</td>

      </tr>

    `;

  });

}
